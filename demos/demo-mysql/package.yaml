name:                demo-mysql
version:             0.1.0.0
license:             BSD3

dependencies:
- base
- bytestring
- io-streams
- mysql-haskell
- relude
- sandwich
- sandwich-contexts
- string-interpolate

default-extensions:
- DataKinds
- OverloadedStrings
- QuasiQuotes
- NamedFieldPuns
- RecordWildCards
- ScopedTypeVariables
- FlexibleContexts
- FlexibleInstances
- LambdaCase

ghc-options:
- -threaded
- -rtsopts
- -with-rtsopts=-N

executables:
  demo-mysql:
    main: Main.hs
    source-dirs: app
